spring.application.name=Execrise2

# SQL Server Database Configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=tutorial;encrypt=true;trustServerCertificate=true;
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=sa
spring.datasource.password=123
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ─── Groq AI API Key Pool ───────────────────────────────────────
# Thêm nhiều key cách nhau bởi dấu phẩy để tăng throughput
# Lấy key miễn phí tại: https://console.groq.com/keys
groq.api-keys=YOUR_GROQ_KEY_1,YOUR_GROQ_KEY_2,YOUR_GROQ_KEY_3
groq.model=llama-3.3-70b-versatile
groq.cooling-seconds=60

# ─── Gemini API (Fallback khi Groq pool cạn) ─────────────────────
# Lấy key tại: https://aistudio.google.com/app/apikey
# Hỗ trợ nhiều key: gemini.api-keys=key1,key2
gemini.api-keys=YOUR_GEMINI_API_KEY_HERE
gemini.model=gemini-1.5-flash
gemini.cooling-seconds=30

# ─── Admin API Security (AdminApiKeyFilter) ───────────────────────
# Header: X-Admin-Token: <giá trị này>
# Bảo vệ: /api/ai/pool-reset, /api/ai/pool-stats, /api/ai/metrics
# ⚠️ THAY BẰNG GIÁ TRỊ NGẪU NHIÊN THỰC TẾ!
admin.api-token=CHANGE_ME_TO_RANDOM_SECRET_123

# ─── WebClient (reactive) ────────────────────────────────────────
spring.codec.max-in-memory-size=5MB

# ─── Scheduling (cho GroqKeyPool + GeminiKeyPool recovery) ───────
spring.task.scheduling.pool.size=2
