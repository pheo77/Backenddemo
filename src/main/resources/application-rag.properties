# =================================================================
# RAG MODULE CONFIGURATION
# Profile: rag (dùng khi chuyển sang PostgreSQL + PGVector)
# Chạy với: java -jar app.jar --spring.profiles.active=rag
# =================================================================

spring.application.name=Execrise2-RAG

# ─── PostgreSQL + PGVector ───────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/ragdb
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ─── JPA / Hibernate ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Flyway Migration ────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─── Spring AI (Uncomment khi có API key) ────────────────────────
# spring.ai.openai.api-key=${OPENAI_API_KEY}
# spring.ai.openai.embedding.model=text-embedding-3-small
# spring.ai.openai.chat.model=gpt-4o-mini

# ─── Redis (Uncomment khi có Redis) ──────────────────────────────
# spring.data.redis.host=localhost
# spring.data.redis.port=6379
# spring.cache.type=redis

# ─── Actuator ────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ─── Async Thread Pool ───────────────────────────────────────────
# Virtual Threads (Java 21) — tự động dùng cho @Async
spring.threads.virtual.enabled=true

# ─── Logging ─────────────────────────────────────────────────────
logging.level.com.example.execrise2.rag=DEBUG
logging.level.org.springframework.web=INFO
